version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: salud_natura_web
    restart: always
    ports:
      - "${APP_PORT:-8010}:8000"
    volumes:
      # Volumen para persistir la base de datos SQLite
      - salud_natura_data:/app/data
    env_file:
      - .env

volumes:
  salud_natura_data:
    name: salud_natura_data
